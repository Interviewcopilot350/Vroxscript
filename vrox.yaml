filetype: vrox
detect:
    filename: "\\.vs$"
rules:
    # Keywords — blue
    - statement: "\\b(let|if|else|while|for|in|repeat|func|call|try|catch|return|break|continue|import|and|or|not)\\b"

    # Output commands — green
    - type: "\\b(out|print|warn|error|success|info|bold|banner|colors|clear)\\b"

    # Security commands — red (dangerous/important)
    - preproc: "\\b(sqli|xsscheck|ssrf|lfi|crlf|ssti|corscheck|takeover|openredirect|secrets|ratelimit)\\b"

    # Network/recon commands — cyan
    - constant: "\\b(scan|subdomains|alive|ports|headers|secheaders|dns|crawl|js|params|wayback|fuzz|resolve|whois|emails|techdetect|ssl|timing|redirectchain|fetch|get|post|report|grep|regex)\\b"

    # File commands — yellow
    - special: "\\b(save|show|read|append|delete|exists|lines|mkdir|listdir|copyfile|movefile|filesize|compress|decompress|csvread|csvwrite)\\b"

    # Data commands — purple
    - identifier: "\\b(dict|dictset|dictget|dictkeys|jsonparse|jsonget|sort|reverse|unique|push|pop|list|count|index|join|split|replace|upper|lower|trim|strlen|contains|startswith|endswith|slice|find|pad|encode|decode|urlencode|urldecode|md5|sha256|tonum|tostr|math|randint|random|timestamp|type)\\b"

    # HTTP settings
    - label: "\\b(setheader|setcookie|clearcookies|clearheaders|setcolor|getcolor)\\b"

    # System commands
    - symbol: "\\b(exec|env|args|sleep|input|banner)\\b"

    # Strings — green
    - constant.string: "\"[^\"]*\""

    # Numbers — yellow
    - constant.number: "\\b[0-9]+(\\.[0-9]+)?\\b"

    # Comments — gray
    - comment: "(#.*|//.*)"

    # Operators
    - symbol.operator: "(>>|->|==|!=|>=|<=|>|<|\\+|-|\\*|/|%)"

    # Boolean/null — special
    - type.keyword: "\\b(true|false|null)\\b"

    # Color variables in strings — bright
    - preproc.define: "\\{[A-Z_]+\\}"

    # Block delimiters
    - symbol.brackets: "[{}]"

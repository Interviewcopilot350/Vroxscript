filetype: vrox
detect:
    filename: "\\.vs$"
rules:
    # Core keywords — blue
    - statement: "\\b(let|if|else|while|for|in|repeat|func|call|try|catch|return|break|continue|import|and|or|not)\\b"

    # Output commands — green
    - type: "\\b(out|print|banner|colors|clear)\\b"

    # Colored output commands — each different
    - preproc.define: "\\b(success|bold)\\b"
    - preproc: "\\b(warn|warning)\\b"
    - error: "\\b(error)\\b"
    - constant: "\\b(info)\\b"
    - label: "\\b(orange|pink|gold|teal|lime)\\b"

    # Vulnerability commands — red (dangerous)
    - error: "\\b(sqli|xsscheck|ssrf|lfi|crlf|ssti|corscheck|takeover|openredirect|secrets|ratelimit)\\b"

    # Passive recon — teal
    - constant.string: "\\b(passive|nopassive|probe)\\b"

    # Network/recon — cyan
    - constant: "\\b(scan|subdomains|alive|ports|headers|secheaders|dns|crawl|js|params|wayback|fuzz|resolve|whois|emails|techdetect|ssl|timing|redirectchain|fetch|get|post|report|grep|regex|template|templates)\\b"

    # File commands — yellow
    - special: "\\b(save|show|read|append|delete|exists|lines|mkdir|listdir|copyfile|movefile|filesize|compress|decompress|csvread|csvwrite)\\b"

    # Data commands — purple
    - identifier: "\\b(dict|dictset|dictget|dictkeys|jsonparse|jsonget|sort|reverse|unique|push|pop|list|count|index|join|split|replace|upper|lower|trim|strlen|contains|startswith|endswith|slice|find|pad|encode|decode|urlencode|urldecode|md5|sha256|tonum|tostr|math|randint|random|timestamp|type)\\b"

    # HTTP/Color/Key settings — orange
    - symbol: "\\b(setheader|setcookie|clearcookies|clearheaders|setcolor|getcolor|setkey|getkey|listkeys)\\b"

    # System commands
    - preproc.define: "\\b(exec|env|args|sleep|input)\\b"

    # Strings — green
    - constant.string: "\"[^\"]*\""

    # Numbers — yellow
    - constant.number: "\\b[0-9]+(\\.[0-9]+)?\\b"

    # Comments — gray/dim
    - comment: "(#.*|//.*)"

    # Operators
    - symbol.operator: "(>>|->|==|!=|>=|<=|>|<|\\+|-|\\*|/|%)"

    # Boolean/null
    - type.keyword: "\\b(true|false|null)\\b"

    # Color variables in strings
    - preproc: "\\{[A-Z_]+\\}"

    # Block delimiters
    - symbol.brackets: "[{}]"

    # Template keywords
    - type: "\\b(wordlist|filter-status|filter-size|threads)\\b"
